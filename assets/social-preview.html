<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=640">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    background: #1A1A2E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    color: #fff;
  }

  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 900px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(232,99,58,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .logo-mark {
    display: grid;
    grid-template-columns: repeat(3, 16px);
    gap: 7px;
    margin-bottom: 20px;
  }

  .dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #E8633A;
  }
  .dot.ghost { background: rgba(232,99,58,0.12); }
  .dot.mid   { background: rgba(232,99,58,0.45); }

  .wordmark {
    font-size: 88px;
    font-weight: 700;
    letter-spacing: -0.08em;
    color: #ffffff;
    line-height: 1;
    margin-bottom: 18px;
  }

  .tagline {
    font-size: 21px;
    font-weight: 400;
    color: rgba(255,255,255,0.42);
    margin-bottom: 36px;
    letter-spacing: 0;
  }

  .divider {
    width: 120px;
    height: 1px;
    background: rgba(232,99,58,0.28);
    margin-bottom: 36px;
  }

  .stats {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .stat {
    text-align: center;
    padding: 0 40px;
  }

  .stat + .stat {
    border-left: 1px solid rgba(255,255,255,0.08);
  }

  .stat-number {
    font-size: 32px;
    font-weight: 700;
    color: #E8633A;
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    letter-spacing: 2.5px;
  }

  .footer {
    position: absolute;
    bottom: 28px;
    left: 60px;
    right: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-url {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.2px;
  }

  .footer-license {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(232,99,58,0.5);
  }

  .version-badge {
    position: absolute;
    top: 24px;
    right: 60px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: rgba(232,99,58,0.55);
  }
</style>
</head>
<body>
  <div class="version-badge">v3.6.0</div>
  <div class="glow"></div>
  <div class="content">
    <div class="logo-mark">
      <div class="dot"></div>
      <div class="dot ghost"></div>
      <div class="dot"></div>
      <div class="dot ghost"></div>
      <div class="dot mid"></div>
      <div class="dot ghost"></div>
      <div class="dot"></div>
      <div class="dot ghost"></div>
      <div class="dot"></div>
    </div>
    <div class="wordmark">naksha</div>
    <div class="tagline">Your agency's design brain. Always on, always yours.</div>
    <div class="divider"></div>
    <div class="stats">
      <div class="stat">
        <div class="stat-number">18</div>
        <div class="stat-label">Roles</div>
      </div>
      <div class="stat">
        <div class="stat-number">32</div>
        <div class="stat-label">Commands</div>
      </div>
      <div class="stat">
        <div class="stat-number">11,000+</div>
        <div class="stat-label">Lines</div>
      </div>
      <div class="stat">
        <div class="stat-number">5</div>
        <div class="stat-label">Agents</div>
      </div>
      <div class="stat">
        <div class="stat-number">5</div>
        <div class="stat-label">Platforms</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <span class="footer-url">github.com/Adityaraj0421/naksha-studio</span>
    <span class="footer-license">MIT License</span>
  </div>
</body>
</html>
