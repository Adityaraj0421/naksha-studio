name: design-score-track
description: Visually inspect the running UI, score it against project standards, then record improvement constraints to memory
version: "2"
steps:
  - type: browser
    mode: inspect
    url: "$INPUT"
    name: "Capture current UI state"
    memory_write: browser_findings
  - command: design-score
    pass-output-as: context
    description: "Score the captured UI against project standards"
    memory_read: ["constraints", "component_patterns", "browser_findings"]
  - command: naksha-remember
    pass-output-as: context
    description: "Persist the top improvement areas as project constraints"
    memory_read: ["constraints"]
on-error: stop
